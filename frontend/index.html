<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>Ballroom Dance Classifier</title>
  <!-- Optional: Add manifest for PWA -->
  <link rel="manifest" href="manifest.json">

  <style>
    :root {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --bg-color: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
    }

    * { box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }

    body {
      margin: 0;
      padding: 20px;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: var(--card-bg);
      width: 100%;
      max-width: 420px;
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      text-align: center;
    }

    h1 {
      margin: 0 0 1.5rem 0;
      font-size: 1.5rem;
      color: var(--text-main);
    }

    /* Buttons */
    .btn {
      border: none;
      padding: 14px 24px;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
    }

    .btn-primary {
      background-color: var(--primary);
      color: white;
    }
    .btn-primary:hover { background-color: var(--primary-hover); }

    .btn-record {
      background-color: var(--danger);
      color: white;
      animation: pulse 1.5s infinite;
      cursor: default; /* Make it look unclickable while recording */
    }
    .btn-record:hover { background-color: var(--danger); }

    .btn-secondary {
      background-color: transparent;
      color: var(--primary);
      border: 2px solid var(--primary);
      margin-top: 1.5rem;
    }
    .btn-secondary:hover {
      background-color: var(--primary);
      color: white;
    }

    /* Pulse animation for recording state */
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.6); }
      70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
      100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }

    /* Loading Spinner */
    .loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    .spinner {
      border: 4px solid #e2e8f0;
      border-top: 4px solid var(--primary);
      border-radius: 50%;
      width: 48px;
      height: 48px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Results */
    .result-title {
      font-size: 1.25rem;
      margin-bottom: 1.5rem;
    }
    .result-title strong {
      display: block;
      font-size: 2rem;
      color: var(--primary);
      margin-top: 0.5rem;
    }

    .details-box {
      background: var(--bg-color);
      border-radius: 12px;
      padding: 1rem;
      text-align: left;
    }
    .details-title {
      font-size: 0.85rem;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .probability-row {
      display: flex;
      justify-content: space-between;
      padding: 0.4rem 0;
      border-bottom: 1px solid #e2e8f0;
      font-size: 0.95rem;
    }
    .probability-row:last-child {
      border-bottom: none;
    }

    /* Utility */
    .hidden { display: none !important; }

    /* Icons (Inline SVG) */
    .icon { width: 20px; height: 20px; fill: currentColor; }
  </style>
</head>
<body>

  <div class="card">
    <h1>Ballroom Dance Classification</h1>

    <!-- 1. RECORDING SECTION -->
    <div id="section-record">
      <p style="color: var(--text-muted); margin-bottom: 2rem;">
        Press the button below and let your device listen to the music for a few seconds.
      </p>
      <button id="record-btn" class="btn btn-primary" onclick="toggleRecording()">
        <svg class="icon" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        <span id="record-text">Start Recording</span>
      </button>
    </div>

    <!-- 2. LOADING SECTION -->
    <div id="section-loading" class="loader-container hidden">
      <div class="spinner"></div>
      <p style="color: var(--text-muted); font-weight: 500;">Analyzing dance style...</p>
    </div>

    <!-- 3. RESULTS SECTION -->
    <div id="section-result" class="hidden">
      <div class="result-title">
        Your song is a <br>
        <strong id="main-result">DiscoFox</strong>
      </div>

      <div class="details-box">
        <div class="details-title">Classification Details</div>
        <div id="details-list">
          <!-- Populated by JS -->
        </div>
      </div>

      <button class="btn btn-secondary" onclick="resetUI()">
        Classify Another Song
      </button>
    </div>
  </div>

  <script>
    const API = "https://brd-backend-35149294787.europe-west1.run.app";

    let isRecording = false;
    let mediaRecorder;
    let audioChunks = [];
    let activeStream;

    // Timer logic
    const REQUIRED_RECORDING_SECONDS = 20;
    let recordingTimer;
    let secondsLeft = REQUIRED_RECORDING_SECONDS;

    // UI Elements
    const sectionRecord = document.getElementById('section-record');
    const sectionLoading = document.getElementById('section-loading');
    const sectionResult = document.getElementById('section-result');
    const recordBtn = document.getElementById('record-btn');
    const recordText = document.getElementById('record-text');
    const mainResult = document.getElementById('main-result');
    const detailsList = document.getElementById('details-list');

    async function toggleRecording() {
      // Prevent user from manually stopping if it's currently recording
      // We will let the timer stop it automatically to ensure perfect duration.
      if (!isRecording) {
        await startRecording();
      }
    }

    async function startRecording() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        activeStream = stream;

        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];

        mediaRecorder.ondataavailable = event => {
          if (event.data.size > 0) {
            audioChunks.push(event.data);
          }
        };

        mediaRecorder.onstop = async () => {
          clearInterval(recordingTimer);
          activeStream.getTracks().forEach(track => track.stop());

          sectionRecord.classList.add('hidden');
          sectionLoading.classList.remove('hidden');

          try {
            // 1. Get raw browser recording (webm/ogg)
            const rawBlob = new Blob(audioChunks);

            // 2. Convert to true WAV file for the Python backend
            const wavBlob = await convertToWav(rawBlob);

            // 3. Upload the WAV file
            await uploadAndClassify(wavBlob);
          } catch (err) {
            console.error("Audio processing error:", err);
            alert("Error processing the recorded audio.");
            resetUI();
          }
        };

        mediaRecorder.start();
        isRecording = true;

        // Update UI to show countdown
        recordBtn.classList.remove('btn-primary');
        recordBtn.classList.add('btn-record');

        secondsLeft = REQUIRED_RECORDING_SECONDS;
        recordText.innerText = `Recording... ${secondsLeft}s`;

        // Start countdown timer
        recordingTimer = setInterval(() => {
          secondsLeft--;
          if (secondsLeft > 0) {
            recordText.innerText = `Recording... ${secondsLeft}s`;
          } else {
            // Auto-stop exactly when we reach the required duration
            stopRecording();
          }
        }, 1000);

      } catch (err) {
        alert("Microphone access denied or not available. Ensure you are on HTTPS.");
        console.error("Mic error:", err);
      }
    }

    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
        isRecording = false;

        // Reset Record Button visually for the next time
        recordBtn.classList.remove('btn-record');
        recordBtn.classList.add('btn-primary');
        recordText.innerText = "Start Recording";
      }
    }

    // --- Web Audio API WAV Converter ---
    async function convertToWav(rawBlob) {
      const arrayBuffer = await rawBlob.arrayBuffer();
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);

      // Convert to Mono 16-bit WAV file
      const numOfChannels = 1;
      const sampleRate = audioBuffer.sampleRate;
      const channelData = audioBuffer.getChannelData(0); // Left channel (Mono)

      const wavBuffer = new ArrayBuffer(44 + channelData.length * 2);
      const view = new DataView(wavBuffer);

      const writeString = (view, offset, string) => {
        for (let i = 0; i < string.length; i++) {
          view.setUint8(offset + i, string.charCodeAt(i));
        }
      };

      // Write WAV Header
      writeString(view, 0, 'RIFF');
      view.setUint32(4, 36 + channelData.length * 2, true);
      writeString(view, 8, 'WAVE');
      writeString(view, 12, 'fmt ');
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true); // PCM format
      view.setUint16(22, numOfChannels, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * 2, true); // Byte rate
      view.setUint16(32, 2, true); // Block align
      view.setUint16(34, 16, true); // 16-bit
      writeString(view, 36, 'data');
      view.setUint32(40, channelData.length * 2, true);

      // Write PCM Samples
      let offset = 44;
      for (let i = 0; i < channelData.length; i++, offset += 2) {
        let s = Math.max(-1, Math.min(1, channelData[i]));
        view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      }

      return new Blob([view], { type: 'audio/wav' });
    }

    async function uploadAndClassify(wavBlob) {
      try {
        const form = new FormData();
        form.append("file", wavBlob, "recording.wav");

        const res = await fetch(`${API}/classify`, {
          method: "POST",
          body: form
        });

        if (!res.ok) throw new Error(`Server returned ${res.status}`);

        const data = await res.json();
        showResults(data);

      } catch (error) {
        console.error("Classification error:", error);
        alert("Oops! Something went wrong while classifying. Make sure the backend is running.");
        resetUI();
      }
    }

    function showResults(data) {
      // Hide loading, show results
      sectionLoading.classList.add('hidden');
      sectionResult.classList.remove('hidden');

      // 1. Set main bold text
      mainResult.innerText = data.predicted_class;

      // 2. Populate details table (sorted by highest probability)
      detailsList.innerHTML = "";

      const sortedProbs = Object.entries(data.probabilities)
        .sort((a, b) => b[1] - a[1]);

      sortedProbs.forEach(([dance, probability]) => {
        const percent = (probability * 100).toFixed(1);

        const row = document.createElement('div');
        row.className = 'probability-row';
        row.innerHTML = `
          <span style="font-weight: 500;">${dance}</span>
          <span style="color: var(--text-muted);">${percent}%</span>
        `;
        detailsList.appendChild(row);
      });
    }

    function resetUI() {
      // Hide all dynamic sections, show record section
      sectionResult.classList.add('hidden');
      sectionLoading.classList.add('hidden');
      sectionRecord.classList.remove('hidden');

      // Safety resets
      recordBtn.classList.remove('btn-record');
      recordBtn.classList.add('btn-primary');
      recordText.innerText = "Start Recording";
      isRecording = false;
      clearInterval(recordingTimer);
    }
  </script>
</body>
</html>
