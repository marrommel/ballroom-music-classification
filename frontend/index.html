<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>Ballroom Dance Classifier</title>
  <!-- Optional: Add manifest for PWA -->
  <link rel="manifest" href="manifest.json">

  <style>
    :root {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --bg-color: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
    }

    * { box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }

    body {
      margin: 0;
      padding: 20px;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: var(--card-bg);
      width: 100%;
      max-width: 420px;
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      text-align: center;
    }

    h1 {
      margin: 0 0 1.5rem 0;
      font-size: 1.5rem;
      color: var(--text-main);
    }

    /* Buttons */
    .btn {
      border: none;
      padding: 14px 24px;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
    }

    .btn-primary {
      background-color: var(--primary);
      color: white;
    }
    .btn-primary:hover { background-color: var(--primary-hover); }

    .btn-record {
      background-color: var(--danger);
      color: white;
      animation: pulse 1.5s infinite;
    }
    .btn-record:hover { background-color: var(--danger-hover); }

    .btn-secondary {
      background-color: transparent;
      color: var(--primary);
      border: 2px solid var(--primary);
      margin-top: 1.5rem;
    }
    .btn-secondary:hover {
      background-color: var(--primary);
      color: white;
    }

    /* Pulse animation for recording state */
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.6); }
      70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
      100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }

    /* Loading Spinner */
    .loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    .spinner {
      border: 4px solid #e2e8f0;
      border-top: 4px solid var(--primary);
      border-radius: 50%;
      width: 48px;
      height: 48px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Results */
    .result-title {
      font-size: 1.25rem;
      margin-bottom: 1.5rem;
    }
    .result-title strong {
      display: block;
      font-size: 2rem;
      color: var(--primary);
      margin-top: 0.5rem;
    }

    .details-box {
      background: var(--bg-color);
      border-radius: 12px;
      padding: 1rem;
      text-align: left;
    }
    .details-title {
      font-size: 0.85rem;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .probability-row {
      display: flex;
      justify-content: space-between;
      padding: 0.4rem 0;
      border-bottom: 1px solid #e2e8f0;
      font-size: 0.95rem;
    }
    .probability-row:last-child {
      border-bottom: none;
    }

    /* Utility */
    .hidden { display: none !important; }

    /* Icons (Inline SVG) */
    .icon { width: 20px; height: 20px; fill: currentColor; }
  </style>
</head>
<body>

  <div class="card">
    <h1>Ballroom Dance Classification</h1>

    <!-- 1. RECORDING SECTION -->
    <div id="section-record">
      <p style="color: var(--text-muted); margin-bottom: 2rem;">
        Press the button below and let your device listen to the music for a few seconds.
      </p>
      <button id="record-btn" class="btn btn-primary" onclick="toggleRecording()">
        <svg class="icon" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        <span id="record-text">Start Recording</span>
      </button>
    </div>

    <!-- 2. LOADING SECTION -->
    <div id="section-loading" class="loader-container hidden">
      <div class="spinner"></div>
      <p style="color: var(--text-muted); font-weight: 500;">Analyzing dance style...</p>
    </div>

    <!-- 3. RESULTS SECTION -->
    <div id="section-result" class="hidden">
      <div class="result-title">
        Your song is a <br>
        <strong id="main-result">DiscoFox</strong>
      </div>

      <div class="details-box">
        <div class="details-title">Classification Details</div>
        <div id="details-list">
          <!-- Populated by JS -->
        </div>
      </div>

      <button class="btn btn-secondary" onclick="resetUI()">
        Classify Another Song
      </button>
    </div>
  </div>

  <script>
    const API = "https://brd-backend-35149294787.europe-west1.run.app";

    let isRecording = false;
    let mediaRecorder;
    let audioChunks = [];
    let activeStream;

    // UI Elements
    const sectionRecord = document.getElementById('section-record');
    const sectionLoading = document.getElementById('section-loading');
    const sectionResult = document.getElementById('section-result');
    const recordBtn = document.getElementById('record-btn');
    const recordText = document.getElementById('record-text');
    const mainResult = document.getElementById('main-result');
    const detailsList = document.getElementById('details-list');

    async function toggleRecording() {
      if (!isRecording) {
        await startRecording();
      } else {
        stopRecording();
      }
    }

    async function startRecording() {
      try {
        // Request microphone access
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        activeStream = stream;

        mediaRecorder = new MediaRecorder(stream);
        audioChunks = []; // Clear previous recordings

        mediaRecorder.ondataavailable = event => {
          if (event.data.size > 0) {
            audioChunks.push(event.data);
          }
        };

        mediaRecorder.onstop = async () => {
          // Stop all mic tracks so the browser recording indicator turns off
          activeStream.getTracks().forEach(track => track.stop());

          // Create the audio blob
          const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
          await uploadAndClassify(audioBlob);
        };

        mediaRecorder.start();
        isRecording = true;

        // Update UI to Recording State
        recordBtn.classList.remove('btn-primary');
        recordBtn.classList.add('btn-record');
        recordText.innerText = "Stop Recording";

      } catch (err) {
        alert("Microphone access denied or not available. Please check your browser permissions.");
        console.error("Mic error:", err);
      }
    }

    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
        isRecording = false;

        // Update UI to Loading State
        sectionRecord.classList.add('hidden');
        sectionLoading.classList.remove('hidden');

        // Reset Record Button visually for the next time
        recordBtn.classList.remove('btn-record');
        recordBtn.classList.add('btn-primary');
        recordText.innerText = "Start Recording";
      }
    }

    async function uploadAndClassify(audioBlob) {
      try {
        const form = new FormData();
        // Modern browsers usually record in webm or ogg. We attach it with a generic name.
        // If your Python backend strictly requires a '.wav' file extension to parse properly,
        // passing "recording.wav" here often tricks it, though it remains compressed audio.
        // Libraries like librosa/ffmpeg handle this seamlessly.
        form.append("file", audioBlob, "recording.webm");

        const res = await fetch(`${API}/classify`, {
          method: "POST",
          body: form
        });

        if (!res.ok) throw new Error(`Server returned ${res.status}`);

        const data = await res.json();
        showResults(data);

      } catch (error) {
        console.error("Classification error:", error);
        alert("Oops! Something went wrong while classifying. Make sure the backend is running.");
        resetUI();
      }
    }

    function showResults(data) {
      // Hide loading, show results
      sectionLoading.classList.add('hidden');
      sectionResult.classList.remove('hidden');

      // 1. Set main bold text
      mainResult.innerText = data.predicted_class;

      // 2. Populate details table (sorted by highest probability)
      detailsList.innerHTML = "";

      const sortedProbs = Object.entries(data.probabilities)
        .sort((a, b) => b[1] - a[1]);

      sortedProbs.forEach(([dance, probability]) => {
        const percent = (probability * 100).toFixed(1);

        const row = document.createElement('div');
        row.className = 'probability-row';
        row.innerHTML = `
          <span style="font-weight: 500;">${dance}</span>
          <span style="color: var(--text-muted);">${percent}%</span>
        `;
        detailsList.appendChild(row);
      });
    }

    function resetUI() {
      // Hide all dynamic sections, show record section
      sectionResult.classList.add('hidden');
      sectionLoading.classList.add('hidden');
      sectionRecord.classList.remove('hidden');
    }
  </script>
</body>
</html>
